version: '3.9'

# Run all three services with a single command:
#   docker compose up
#
# Requires a .env file in this directory with:
#   MONGO_URI=mongodb://mongo:27017/noshow_iq

services:

  # ── Your FastAPI application ────────────────────────────────────────────
  api:
    build: .
    ports:
      - '8000:7860'           # visit http://localhost:8000/docs
    environment:
      MONGO_URI: ${MONGO_URI} # reads from .env — NEVER hard-code credentials
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Local MongoDB instance ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db   # persist data between restarts
    restart: unless-stopped

  # ── Web UI for browsing Mongo collections ───────────────────────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - '8081:8081'           # visit http://localhost:8081
    environment:
      ME_CONFIG_MONGODB_SERVER:      mongo
      ME_CONFIG_BASICAUTH_USERNAME:  admin
      ME_CONFIG_BASICAUTH_PASSWORD:  admin
    depends_on:
      - mongo

volumes:
  mongo_data:
